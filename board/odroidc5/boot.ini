ODROIDC5-UBOOT-CONFIG

# U-Boot boot script for Odroid C5
# RETROPANGUI-C5 Retro Gaming OS

setenv bootargs "console=tty1 console=ttyS0,115200n8 earlycon=aml_uart,0xfe07a000 net.ifnames=0 vout=1920x1080p60hz,enable connector0_type=HDMI-A-A hdmimode=1920x1080p60hz hdmitx=,422,12bit panic=0"

setenv loadaddr "0x03080000"
setenv dtb_loadaddr "0x01000000"
setenv ramdisk_addr "0x10000000"

# Load kernel, device tree, initramfs — ${devnum}: 1=SD, 0=eMMC
fatload mmc ${devnum}:1 ${loadaddr} Image
fatload mmc ${devnum}:1 ${dtb_loadaddr} s7d_s905x5m_odroidc5.dtb
fatload mmc ${devnum}:1 ${ramdisk_addr} initramfs.cpio.gz

# Boot with initramfs — :${filesize}로 initramfs 크기 전달 (없으면 커널이 무시함)
booti ${loadaddr} ${ramdisk_addr}:${filesize} ${dtb_loadaddr}
