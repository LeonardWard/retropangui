<?xml version="1.0"?>
<inputList>
	<!-- 키보드 기본 매핑 — SDL2 KMSDRM에서 evdev로 수신한 SDL_KEYDOWN 이벤트 처리
	     deviceGUID="-1" 은 ES 내부 KEYBOARD_GUID_STRING 상수와 일치해야 함
	     id 값은 SDL2 SDLK_* 코드 (십진수):
	       SDLK_UP=1073741906  SDLK_DOWN=1073741905
	       SDLK_LEFT=1073741904 SDLK_RIGHT=1073741903
	       SDLK_RETURN=13  SDLK_ESCAPE=27
	       SDLK_F1=1073741882  SDLK_F2=1073741883
	       SDLK_LEFTBRACKET=91  SDLK_RIGHTBRACKET=93 -->
	<inputConfig type="keyboard" deviceName="Keyboard" deviceGUID="-1">
		<input name="up"            type="key" id="1073741906" value="1" />
		<input name="down"          type="key" id="1073741905" value="1" />
		<input name="left"          type="key" id="1073741904" value="1" />
		<input name="right"         type="key" id="1073741903" value="1" />
		<input name="a"             type="key" id="27"         value="1" />
		<input name="b"             type="key" id="13"         value="1" />
		<input name="start"         type="key" id="1073741882" value="1" />
		<input name="select"        type="key" id="1073741883" value="1" />
		<input name="leftshoulder"  type="key" id="91"         value="1" />
		<input name="rightshoulder" type="key" id="93"         value="1" />
		<input name="pageup"        type="key" id="1073741899" value="1" />
		<input name="pagedown"      type="key" id="1073741902" value="1" />
	</inputConfig>
</inputList>
