# retropangui_features.yml
# ES 시작 시 이 파일을 읽어 메뉴 항목을 자동 생성한다.
# 값은 retropangui.conf 에 저장된다.
# restart: none | es | system
# parent: 항목이 삽입될 위치
#   - game | controller | system : 해당 ES 카테고리 메뉴 안에 항목으로 직접 삽입
#   - main                       : 메인 메뉴에 독립 서브메뉴로 추가 (확장용)

menus:
  - id: system_settings
    label: "SYSTEM SETTINGS"
    parent: system
    items:
      - id: rp.hostname
        label: "HOSTNAME"
        type: input
        conf_key: system.hostname
        restart: none

      - id: rp.ticker_submenu
        label: "TICKER SETTINGS"
        type: submenu
        id: ticker_settings

      - id: rp.timezone
        label: "TIMEZONE"
        type: list
        conf_key: system.timezone
        restart: none
        options:
          - value: Asia/Seoul
            label: "Seoul (KST)"
          - value: America/New_York
            label: "New York (EST)"
          - value: Europe/Paris
            label: "Paris (CET)"
          - value: America/Los_Angeles
            label: "Los Angeles (PST)"
      # HDMI 출력 해상도(OUTPUT RESOLUTION)는 잘못 고르면 화면이 안 보이게
      #될 수 있는 위험한 설정이라 YAML 목록형이 아니라 GuiMenu.cpp의
      # openSystemSettings()에 네이티브로(확인+되돌리기 포함) 구현함
      # - A/B 버튼전환(SWAP BUTTONS A/B)과 동일한 패턴.

  # 뉴스/증권 티커 API 키 입력 - system_settings 안의 rp.ticker_submenu(type:
  # submenu)로만 진입 가능(parent가 고정 카테고리가 아니라 자기 id라 자동
  # flatten 대상 아님). 2026-07-10, todo-20260708-news-ticker.html.
  # 실제 데이터 수집 데몬/marquee 렌더링(C++)은 아직 미구현 - 이 메뉴는
  # 사용자가 API 키를 발급받는 대로 미리 입력해둘 수 있게 골격만 먼저 추가.
  - id: ticker_settings
    label: "TICKER SETTINGS"
    parent: ticker_settings
    items:
      - id: rp.ticker_naver_client_id
        label: "NAVER CLIENT ID"
        type: input
        conf_key: ticker.naver_client_id
        restart: none

      - id: rp.ticker_naver_client_secret
        label: "NAVER CLIENT SECRET"
        type: input
        conf_key: ticker.naver_client_secret
        restart: none

      - id: rp.ticker_krx_api_key
        label: "KRX API KEY"
        type: input
        conf_key: ticker.krx_api_key
        restart: none

      - id: rp.ticker_weather_service_key
        label: "WEATHER SERVICE KEY"
        type: input
        conf_key: ticker.weather_service_key
        restart: none

      - id: rp.ticker_weather_nx
        label: "WEATHER NX"
        type: input
        conf_key: ticker.weather_nx
        restart: none

      - id: rp.ticker_weather_ny
        label: "WEATHER NY"
        type: input
        conf_key: ticker.weather_ny
        restart: none

  - id: audio_settings
    label: "AUDIO SETTINGS"
    parent: sound
    items:
      - id: rp.bgm
        label: "BACKGROUND MUSIC"
        type: toggle
        conf_key: emulationstation.BackgroundMusic
        default: "true"
        restart: none

      - id: rp.volume
        label: "SYSTEM VOLUME"
        type: slider
        conf_key: system.volume
        min: 0
        max: 100
        step: 1
        unit: "%"
        restart: none

      # AUDIO CARD: 고정 목록(default/sysdefault/dmix/...) 대신 실제 연결된
      # 사운드카드를 /proc/asound/cards에서 실시간 스캔해서 보여줘야 해서
      # YAML 정적 목록으로 표현 불가 - GuiMenu.cpp의 openSoundSettings()에
      # 네이티브로 구현함(2026-07-11).
      # AUDIO DEVICE(믹서 컨트롤 선택)는 제거 - ES 볼륨은 항상 Master
      # 하나만 쓰면 되고, 어느 카드의 어느 세부 컨트롤인지는 무의미해서
      # 사용자가 고를 필요가 없는 설정이었음. Settings.cpp 기본값(Master)
      # 그대로 사용.

      - id: rp.enable_sounds
        label: "ENABLE NAVIGATION SOUNDS"
        type: toggle
        conf_key: emulationstation.EnableSounds
        restart: none

      - id: rp.video_audio
        label: "ENABLE VIDEO AUDIO"
        type: toggle
        conf_key: emulationstation.VideoAudio
        restart: none

      - id: rp.audio_latency
        label: "RA AUDIO LATENCY"
        type: slider
        conf_key: global.audio_latency
        min: 16
        max: 256
        step: 8
        unit: "ms"
        restart: none

  - id: ui_settings
    label: "UI SETTINGS"
    parent: ui
    items:
      - id: rp.language
        label: "LANGUAGE"
        type: list
        conf_key: system.language
        restart: es
        options:
          - value: en_US
            label: "English (US)"
          - value: ko_KR
            label: "한국어 (Korean)"
          - value: ja_JP
            label: "日本語 (Japanese)"
          - value: zh_CN
            label: "中文简体 (Chinese)"

      # 2026-07-06: 아래 7개는 GuiMenu.cpp에 하드코딩돼 있던 단순 토글/리스트를
      # YAML로 옮긴 것 - conf_key는 Settings:: 키 이름과 정확히 일치해야
      # emulationstation.* 브릿지(Settings::loadRetropanguiConf(), apply_retropangui_conf.sh)가
      # 작동함. IGNORE ARTICLES는 값이 바뀔 때 전체 재정렬+팝업까지 하는 로직이
      # 붙어있어서 YAML로 옮기지 않고 C++에 그대로 둠(GuiMenu.cpp 참고).
      # 2026-07-11: 이 둘은 C++ 시절 실제 기본값이 true였는데(Settings.cpp
      # QuickSystemSelect/ShowHelpPrompts) YAML 이관 때(commit 2396b99)
      # default: 필드를 안 넣어서 GuiMenu.cpp의 fallback("false")을 그대로
      # 타고 있었음 - conf 파일에 이 키가 아직 없는(=이관 이전부터 쓰던)
      # 기기에서 UI SETTINGS를 한 번이라도 열었다 닫으면 조용히 false로
      # 저장돼버려서, 특히 ShowHelpPrompts는 하단 도움말 표시줄이 통째로
      # 사라지는 버그로 이어졌음(todo-20260710-helpbar-missing.html).
      - id: rp.quick_system_select
        label: "QUICK SYSTEM SELECT"
        type: toggle
        conf_key: emulationstation.QuickSystemSelect
        default: "true"
        restart: none

      - id: rp.show_help_prompts
        label: "ON-SCREEN HELP"
        type: toggle
        conf_key: emulationstation.ShowHelpPrompts
        default: "true"
        restart: none

      - id: rp.show_hidden_files
        label: "SHOW HIDDEN FILES"
        type: toggle
        conf_key: emulationstation.ShowHiddenFiles
        restart: none

      - id: rp.use_fullscreen_paging
        label: "USE FULL SCREEN PAGING FOR LB/RB"
        type: toggle
        conf_key: emulationstation.UseFullscreenPaging
        restart: none

      - id: rp.save_gamelists_mode
        label: "SAVE METADATA"
        type: list
        conf_key: emulationstation.SaveGamelistsMode
        restart: none
        options:
          - value: "on exit"
            label: "on exit"
          - value: "always"
            label: "always"
          - value: "never"
            label: "never"

      - id: rp.parse_gamelist_only
        label: "PARSE GAMESLISTS ONLY"
        type: toggle
        conf_key: emulationstation.ParseGamelistOnly
        restart: none

      - id: rp.local_art
        label: "SEARCH FOR LOCAL ART"
        type: toggle
        conf_key: emulationstation.LocalArt
        restart: none

  - id: network_settings
    label: "NETWORK SETTINGS"
    # parent가 6개 고정 카테고리(system/sound/ui/game/controller) 중 하나가
    # 아니면 addFeatureItemsTo()의 자동 flatten 대상이 안 됨 - 이 블록은
    # GuiMenu::openNetworkSettings()가 addFeatureItemsTo(s, "network_settings", ...)로
    # 명시적으로만 끌어옴(2026-07-10, todo-20260704-wifi-menu-polish.html).
    # 예전엔 parent: system이라 SYSTEM SETTINGS에 다른 항목들과 flat하게
    # 섞여 있었음 - 진짜 NETWORK 서브메뉴로 분리하며 바꿈.
    parent: network_settings
    items:
      - id: rp.ssh
        label: "SSH"
        type: toggle
        conf_key: system.ssh
        restart: none

      - id: rp.samba
        label: "SAMBA"
        type: toggle
        conf_key: system.samba
        restart: none

      - id: rp.wifi
        label: "WIFI"
        type: toggle
        conf_key: system.wifi.enabled
        restart: none

  # 2026-07-10: video_settings/bundlegame_settings/game_settings 3블록을
  # 하나로 통합(todo-20260704-wifi-menu-polish.html 항목 ②) - 셋 다
  # parent: game라서 addFeatureItemsTo()가 어차피 순서대로 flat하게 이미
  # 합쳐서 보여주고 있었음(id/label은 parent가 고정 카테고리일 때 렌더링에
  # 안 쓰임) - 화면엔 변화 없는 순수 정리, 아이템 순서는 원래 파일 순서
  # (video_smooth/video_scale_integer → bundlegame_show → video_driver 이하)
  # 그대로 유지.
  - id: game_settings
    label: "GAME SETTINGS"
    parent: game
    items:
      - id: rp.video_smooth
        label: "SMOOTH SCALING"
        type: toggle
        conf_key: global.video_smooth
        restart: none

      - id: rp.video_scale_integer
        label: "INTEGER SCALING"
        type: toggle
        conf_key: global.video_scale_integer
        restart: none

      # SHOW BUNDLED GAMES: killall emulationstation으로 강제 재시작하던
      # 부작용(DRM plane 깨짐, 2026-07-12 실기기 확인) 때문에 YAML toggle이
      # 아니라 GuiMenu.cpp의 openGameSettings()에 네이티브로(gamelist.xml
      # 갱신 동기 실행 → quitES() 순서 보장) 구현함.

      - id: rp.video_driver
        label: "VIDEO DRIVER"
        type: list
        conf_key: global.video_driver
        default: vulkan
        restart: none
        options:
          - value: vulkan
            label: "Vulkan (권장)"
          - value: gl
            label: "OpenGL ES (호환성 폴백)"

      - id: rp.rewind
        label: "REWIND"
        type: toggle
        conf_key: global.rewind_enable
        restart: none

      - id: rp.savestate_auto_save
        label: "AUTO SAVE STATE"
        type: toggle
        conf_key: global.savestate_auto_save
        restart: none

      - id: rp.savestate_auto_load
        label: "AUTO LOAD STATE"
        type: toggle
        conf_key: global.savestate_auto_load
        restart: none

      # 2026-07-17: 게임 실행 전 세이브 스테이트 목록+썸네일 화면
      # (todo-20260706-savestate-preview.html). 실행 흐름을 가로채는 기능이라
      # 설계 문서대로 기본 꺼짐이었으나, 2026-07-20 기본값을 켜짐으로 변경.
      - id: rp.savestate_preview
        label: "SHOW SAVE STATES BEFORE LAUNCH"
        type: toggle
        conf_key: emulationstation.SaveStatePreview
        default: "true"
        restart: none

  - id: advanced_settings
    label: "ADVANCED SETTINGS"
    parent: controller
    items:
      # 2026-07-11: JOYPAD DRIVER 제거 - 실제 기본값은 udev인데 라벨은
      # "linuxraw (기본)"이라 되어 있어서 오해를 주고 있었고, 일반
      # 사용자가 판단할 필요 없는 설정이라는 사용자 결정으로 삭제.
      # retroarch.cfg의 input_joypad_driver=udev는 그대로 유지됨.

      - id: rp.menu_unified_controls
        label: "UNIFIED CONTROLS"
        type: toggle
        conf_key: global.menu_unified_controls
        restart: none

      # 2026-07-17: ES 메뉴 이동/선택 시 짧은 진동 피드백
      # (todo-20260716-es-menu-rumble.html)
      - id: rp.menu_rumble
        label: "MENU RUMBLE"
        type: toggle
        conf_key: emulationstation.MenuRumble
        default: "true"
        restart: none

      # 세기 슬라이더 - 조절 중 즉시 그 세기로 진동 피드백(GuiMenu.cpp 특례).
      # PS2 패드류는 모터 특성상 저세기 단펄스가 무감각해 사용자별 튜닝 필요
      # (2026-07-17 사용자 요청).
      - id: rp.menu_rumble_strength
        label: "MENU RUMBLE STRENGTH"
        type: slider
        conf_key: emulationstation.MenuRumbleStrength
        min: 10
        max: 100
        step: 10
        unit: "%"
        restart: none
