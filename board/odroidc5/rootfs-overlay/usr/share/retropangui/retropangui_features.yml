# retropangui_features.yml
# ES 시작 시 이 파일을 읽어 메뉴 항목을 자동 생성한다.
# 값은 retropangui.conf 에 저장된다.
# restart: none | es | system
# parent: 항목이 삽입될 위치
#   - game | controller | system : 해당 ES 카테고리 메뉴 안에 항목으로 직접 삽입
#   - main                       : 메인 메뉴에 독립 서브메뉴로 추가 (확장용)

menus:
  - id: system_settings
    label: "SYSTEM SETTINGS"
    parent: system
    items:
      - id: rp.hostname
        label: "HOSTNAME"
        type: input
        conf_key: system.hostname
        restart: none

      - id: rp.timezone
        label: "TIMEZONE"
        type: list
        conf_key: system.timezone
        restart: none
        options:
          - value: Asia/Seoul
            label: "Seoul (KST)"
          - value: America/New_York
            label: "New York (EST)"
          - value: Europe/Paris
            label: "Paris (CET)"
          - value: America/Los_Angeles
            label: "Los Angeles (PST)"

  - id: audio_settings
    label: "AUDIO SETTINGS"
    parent: sound
    items:
      - id: rp.bgm
        label: "BACKGROUND MUSIC"
        type: toggle
        conf_key: emulationstation.BackgroundMusic
        default: "true"
        restart: none

      - id: rp.volume
        label: "SYSTEM VOLUME"
        type: slider
        conf_key: system.volume
        min: 0
        max: 100
        step: 1
        unit: "%"
        restart: none

      - id: rp.audio_card
        label: "AUDIO CARD"
        type: list
        conf_key: global.audio_device
        restart: none
        options:
          - value: default
            label: "default"
          - value: sysdefault
            label: "sysdefault"
          - value: dmix
            label: "dmix"
          - value: hw
            label: "hw"
          - value: plughw
            label: "plughw"
          - value: "null"
            label: "null"

      - id: rp.audio_device
        label: "AUDIO DEVICE"
        type: list
        conf_key: emulationstation.AudioDevice
        restart: none
        options:
          - value: PCM
            label: "PCM"
          - value: HDMI
            label: "HDMI"
          - value: Headphone
            label: "Headphone"
          - value: Speaker
            label: "Speaker"
          - value: Master
            label: "Master"
          - value: Digital
            label: "Digital"
          - value: Analogue
            label: "Analogue"

      - id: rp.enable_sounds
        label: "ENABLE NAVIGATION SOUNDS"
        type: toggle
        conf_key: emulationstation.EnableSounds
        restart: none

      - id: rp.video_audio
        label: "ENABLE VIDEO AUDIO"
        type: toggle
        conf_key: emulationstation.VideoAudio
        restart: none

      - id: rp.audio_latency
        label: "RA AUDIO LATENCY"
        type: slider
        conf_key: global.audio_latency
        min: 16
        max: 256
        step: 8
        unit: "ms"
        restart: none

  - id: ui_settings
    label: "UI SETTINGS"
    parent: ui
    items:
      - id: rp.language
        label: "LANGUAGE"
        type: list
        conf_key: system.language
        restart: es
        options:
          - value: en_US
            label: "English (US)"
          - value: ko_KR
            label: "한국어 (Korean)"
          - value: ja_JP
            label: "日本語 (Japanese)"
          - value: zh_CN
            label: "中文简体 (Chinese)"

      # 2026-07-06: 아래 7개는 GuiMenu.cpp에 하드코딩돼 있던 단순 토글/리스트를
      # YAML로 옮긴 것 - conf_key는 Settings:: 키 이름과 정확히 일치해야
      # emulationstation.* 브릿지(Settings::loadRetropanguiConf(), apply_retropangui_conf.sh)가
      # 작동함. IGNORE ARTICLES는 값이 바뀔 때 전체 재정렬+팝업까지 하는 로직이
      # 붙어있어서 YAML로 옮기지 않고 C++에 그대로 둠(GuiMenu.cpp 참고).
      - id: rp.quick_system_select
        label: "QUICK SYSTEM SELECT"
        type: toggle
        conf_key: emulationstation.QuickSystemSelect
        restart: none

      - id: rp.show_help_prompts
        label: "ON-SCREEN HELP"
        type: toggle
        conf_key: emulationstation.ShowHelpPrompts
        restart: none

      - id: rp.show_hidden_files
        label: "SHOW HIDDEN FILES"
        type: toggle
        conf_key: emulationstation.ShowHiddenFiles
        restart: none

      - id: rp.use_fullscreen_paging
        label: "USE FULL SCREEN PAGING FOR LB/RB"
        type: toggle
        conf_key: emulationstation.UseFullscreenPaging
        restart: none

      - id: rp.save_gamelists_mode
        label: "SAVE METADATA"
        type: list
        conf_key: emulationstation.SaveGamelistsMode
        restart: none
        options:
          - value: "on exit"
            label: "on exit"
          - value: "always"
            label: "always"
          - value: "never"
            label: "never"

      - id: rp.parse_gamelist_only
        label: "PARSE GAMESLISTS ONLY"
        type: toggle
        conf_key: emulationstation.ParseGamelistOnly
        restart: none

      - id: rp.local_art
        label: "SEARCH FOR LOCAL ART"
        type: toggle
        conf_key: emulationstation.LocalArt
        restart: none

  - id: network_settings
    label: "NETWORK SETTINGS"
    # parent가 6개 고정 카테고리(system/sound/ui/game/controller) 중 하나가
    # 아니면 addFeatureItemsTo()의 자동 flatten 대상이 안 됨 - 이 블록은
    # GuiMenu::openNetworkSettings()가 addFeatureItemsTo(s, "network_settings", ...)로
    # 명시적으로만 끌어옴(2026-07-10, todo-20260704-wifi-menu-polish.html).
    # 예전엔 parent: system이라 SYSTEM SETTINGS에 다른 항목들과 flat하게
    # 섞여 있었음 - 진짜 NETWORK 서브메뉴로 분리하며 바꿈.
    parent: network_settings
    items:
      - id: rp.ssh
        label: "SSH"
        type: toggle
        conf_key: system.ssh
        restart: none

      - id: rp.samba
        label: "SAMBA"
        type: toggle
        conf_key: system.samba
        restart: none

      - id: rp.wifi
        label: "WIFI"
        type: toggle
        conf_key: system.wifi.enabled
        restart: none

  # 2026-07-10: video_settings/bundlegame_settings/game_settings 3블록을
  # 하나로 통합(todo-20260704-wifi-menu-polish.html 항목 ②) - 셋 다
  # parent: game라서 addFeatureItemsTo()가 어차피 순서대로 flat하게 이미
  # 합쳐서 보여주고 있었음(id/label은 parent가 고정 카테고리일 때 렌더링에
  # 안 쓰임) - 화면엔 변화 없는 순수 정리, 아이템 순서는 원래 파일 순서
  # (video_smooth/video_scale_integer → bundlegame_show → video_driver 이하)
  # 그대로 유지.
  - id: game_settings
    label: "GAME SETTINGS"
    parent: game
    items:
      - id: rp.video_smooth
        label: "SMOOTH SCALING"
        type: toggle
        conf_key: global.video_smooth
        restart: none

      - id: rp.video_scale_integer
        label: "INTEGER SCALING"
        type: toggle
        conf_key: global.video_scale_integer
        restart: none

      - id: rp.bundlegame_show
        label: "SHOW BUNDLED GAMES"
        type: toggle
        conf_key: system.bundlegame_show
        restart: none

      - id: rp.video_driver
        label: "VIDEO DRIVER"
        type: list
        conf_key: global.video_driver
        default: vulkan
        restart: none
        options:
          - value: vulkan
            label: "Vulkan (권장)"
          - value: gl
            label: "OpenGL ES (호환성 폴백)"

      - id: rp.rewind
        label: "REWIND"
        type: toggle
        conf_key: global.rewind_enable
        restart: none

      - id: rp.savestate_auto_save
        label: "AUTO SAVE STATE"
        type: toggle
        conf_key: global.savestate_auto_save
        restart: none

      - id: rp.savestate_auto_load
        label: "AUTO LOAD STATE"
        type: toggle
        conf_key: global.savestate_auto_load
        restart: none

  - id: advanced_settings
    label: "ADVANCED SETTINGS"
    parent: controller
    items:
      - id: rp.input_joypad_driver
        label: "JOYPAD DRIVER"
        type: list
        conf_key: global.input_joypad_driver
        restart: system
        options:
          - value: linuxraw
            label: "linuxraw (기본)"
          - value: udev
            label: "udev"

      - id: rp.menu_unified_controls
        label: "UNIFIED CONTROLS"
        type: toggle
        conf_key: global.menu_unified_controls
        restart: none
