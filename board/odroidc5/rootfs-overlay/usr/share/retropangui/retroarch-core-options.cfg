# RetroArch core options — RetroPangui defaults
# 첫 부팅 시 /retropangui/share/system/retroarch/retroarch-core-options.cfg 로 복사됨.
# 이후 RetroArch가 직접 이 파일을 읽고 쓴다.

# PCSX-ReARMed — PS1 에뮬레이터
# DualShock 지정은 core 옵션이 아니라 시스템별 .retroarch.cfg의
# input_libretro_device_pN(라이브레트로 디바이스 ID, DualShock=517)으로 해야 함 -
# pcsx_rearmed_padNtype은 이 코어 소스(frontend/libretro.c)에 아예 없는 죽은 키라
# 아무리 값을 바꿔도 무시됨(2026-07-09 소스 확인, S95retropangui 참고).
pcsx_rearmed_vibration = "enabled"
# CPU 속도 향상 (Odroid C5 충분한 성능)
pcsx_rearmed_frameskip = "0"
pcsx_rearmed_region = "Auto"

# PPSSPP — PSP 에뮬레이터
# 기본값(auto)이 Vulkan 백엔드를 먼저 시도하는데 이 시스템의 윈도우 시스템
# (KMS/GBM)용 Vulkan 서피스 구현이 없어서 코어가 즉사함("Vulkan support for
# chosen window system not implemented", 2026-07-13 실기기 실측). GLES로 강제.
ppsspp_backend = "opengl"
