# RetroPangUI: AMLAUGESOUND 카드 전용 PulseAudio 프로파일 (2026-07-17)
#
# 기본 동작(폴백 프로브)은 카드의 모든 PCM 디바이스(0=i2s2hdmi, 1=spdifb,
# 2=i2s, 3=spdif)를 열어보는데, SPDIF 디바이스를 여는 순간 hdmitx 드라이버가
# HDMI 오디오 소스를 SPDIF(aud_src_if=0)로 래치해버려서 - 실제 오디오는
# TDM-B(I2S)로 흐르는데 HDMI는 SPDIF를 듣고 있는 - "지표는 전부 정상인데
# 무음"인 상태가 부팅마다 확률적으로 재현됐다(2026-07-17 실기기, PA 모니터
# 계측으로 데이터 흐름 확인 + dmesg aud_src_if 대조로 확정).
# HDMI 출력(디바이스 0)만 매핑하고 프로브도 생략해서 SPDIF를 아예 안 건드림.
# 이 파일은 /etc/udev/rules.d/91-pulseaudio-amlogic.rules가 연결한다.

[General]
auto-profiles = no

[Mapping i2s2hdmi]
device-strings = hw:%f,0
channel-map = left,right
exact-channels = true
fallback = no
direction = output

[Profile output:i2s2hdmi]
output-mappings = i2s2hdmi
skip-probe = yes
