# ALSA 설정 - Odroid C5 (AML-AUGESOUND, HDMI 출력)
#
# DAI-link 구조:
#   device 0: alsaPORT-i2s2hdmi (TDM-B → HDMI PCM) ← 메인 출력
#   device 1: alsaPORT-spdifb   (SPDIF-B → HDMI)
#   device 2: alsaPORT-i2s      (TDM-C, 내부 코덱)
#   device 3: alsaPORT-spdif    (SPDIF-A)
#
# 2026-07-11: card 0 하드코딩 버그 - USB 오디오 장치(컨트롤러 등)가
# 온보드보다 먼저 등록되면 카드 번호가 밀려서 default가 엉뚱한(USB)
# 장치를 가리키게 되고, 어떤 AUDIO CARD 메뉴 옵션을 골라도 실제로는
# 소리가 안 나오는 문제로 이어졌음. 번호 대신 카드 이름으로 참조해서
# 등록 순서에 영향을 받지 않게 함.

pcm.!default {
    type softvol
    slave.pcm "hw:AMLAUGESOUND,0"
    control {
        name "Master"
        card AMLAUGESOUND
    }
}

ctl.!default {
    type hw
    card AMLAUGESOUND
}
