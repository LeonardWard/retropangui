# ALSA 설정 - Odroid C5 (PulseAudio 경유, 2026-07-17 전환)
#
# 이력:
# - 2026-07-11: card 0 하드코딩 → 카드 이름(AMLAUGESOUND) 참조로 수정
# - 2026-07-14: dmix+softvol 계층 추가 (fluidsynth 상시 데몬과 게임 오디오의
#   동시 재생을 위해)
# - 2026-07-17: PulseAudio 전환 (todo-20260716-pulseaudio-migration.html).
#   softvol/dmix 직접 구성은 두 가지 구조적 문제가 있었음:
#   ① pcm.!default를 파일 레벨에서 바꿔도 이미 열린 스트림(libvlc/RetroArch)은
#      안 옮겨감 - 블루투스 오디오 자동전환 실패(2026-07-16 실기기 확인)
#   ② softvol 유저컨트롤('Master')은 부팅 후 최초로 default를 연 프로세스
#      (S62midisynth의 fluidsynth)가 커널 잠금을 쥐게 되어, ES의
#      VolumeControl::setVolume()이 전부 EPERM으로 실패 - "시스템 볼륨이
#      배경음악에 안 먹는" 회귀(2026-07-17 실기기 실증, l 플래그 확인)
#
# 이제 믹싱/볼륨/장치 전환은 전부 PulseAudio(S50pulseaudio, 시스템 모드)가
# 담당하고, ALSA 앱(VLC/RetroArch alsathread/fluidsynth/amixer/aplay)은
# alsa-plugins의 pulse 플러그인으로 PA에 붙는다. ctl의 'Master'는 PA 기본
# sink 볼륨에 매핑되므로 ES 볼륨 슬라이더/apply_retropangui_conf.sh의
# amixer sset Master가 모든 재생 스트림에 일관되게 적용된다.

pcm.!default {
    type pulse
    # PA가 죽어 있으면 열기 실패 - 폴백 없음(문제를 숨기지 않기 위해 의도적)
}

ctl.!default {
    type pulse
}
