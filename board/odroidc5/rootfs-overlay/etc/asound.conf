# ALSA 설정 - Odroid C5 (AML-AUGESOUND, HDMI 출력)
#
# DAI-link 구조:
#   device 0: alsaPORT-i2s2hdmi (TDM-B → HDMI PCM) ← 메인 출력
#   device 1: alsaPORT-spdifb   (SPDIF-B → HDMI)
#   device 2: alsaPORT-i2s      (TDM-C, 내부 코덱)
#   device 3: alsaPORT-spdif    (SPDIF-A)
#
# 2026-07-11: card 0 하드코딩 버그 - USB 오디오 장치(컨트롤러 등)가
# 온보드보다 먼저 등록되면 카드 번호가 밀려서 default가 엉뚱한(USB)
# 장치를 가리키게 되고, 어떤 AUDIO CARD 메뉴 옵션을 골라도 실제로는
# 소리가 안 나오는 문제로 이어졌음. 번호 대신 카드 이름으로 참조해서
# 등록 순서에 영향을 받지 않게 함.
#
# 2026-07-14: dmix 계층 추가 - 기존엔 hw 장치 직접 접근이라 한 번에 한
# 프로세스만 열 수 있었음(그래서 ES가 게임 실행 직전 배경음악을 항상
# 먼저 꺼야 했음, MusicManager::stop() 참조). fluidsynth를 상시 데몬으로
# 띄워 DOS 게임 MIDI를 하드웨어 MT-32 없이도 재생하려면 게임 오디오와
# 동시에 장치를 열 수 있어야 해서 dmix로 소프트웨어 믹싱 계층을 끼움.
# rate/format을 고정하는 게 dmix 요구사항 - 48kHz/S16_LE/스테레오는
# HDMI 오디오 표준 조합이라 리샘플링 오버헤드가 최소화됨.

pcm.dmixer {
    type dmix
    ipc_key 1027
    slave {
        pcm "hw:AMLAUGESOUND,0"
        rate 48000
        format S16_LE
        channels 2
        period_size 1024
        buffer_size 4096
    }
}

pcm.!default {
    type softvol
    slave.pcm "dmixer"
    control {
        name "Master"
        card AMLAUGESOUND
    }
}

ctl.!default {
    type hw
    card AMLAUGESOUND
}
