# RetroArch configuration for RETROPANGUI-C5 (Odroid C5, Mali-G310, KMS/DRM)

libretro_directory = "/usr/lib/libretro"
libretro_info_path = "/usr/share/libretro/info"

savefile_directory = "/retropangui/share/saves"
# 스테이트도 세이브와 같은 폴더에 — saves/<시스템>/에 srm/state 함께 저장
savestate_directory = "/retropangui/share/saves"
screenshot_directory = "/retropangui/share/screenshots"
system_directory = "/retropangui/share/bios"

# Saves 분류: 코어 이름 폴더 대신 콘텐츠 디렉토리(= roms/<시스템>) 이름으로 분류
# 예: roms/snes/game.zip → saves/snes/game.srm (기존 코어 이름 폴더는 마이그레이션 안 함)
sort_savefiles_enable = "false"
sort_savefiles_by_content_enable = "true"
sort_savestates_enable = "false"
sort_savestates_by_content_enable = "true"

# 스크린샷 시스템별 분류: rpui-launcher.py의 write_system_override()가 게임
# 실행마다 screenshot_directory = share/screenshots/<시스템>을 동적으로 계산해
# /tmp 오버라이드 파일로 써서 --appendconfig 체인에 주입함(2026-07-10~, 정적
# 파일을 쓰던 예전 S95retropangui 방식에서 이관됨). 2026-07-06에 여기
# sort_screenshots_by_content_enable을 추가했다가, 그 결과 이미 시스템별로
# 분리된 경로 위에 RetroArch가 ROM 부모 폴더명을 한 번 더 붙여서
# screenshots/nes/nes/ 처럼 중첩되는 회귀 버그가 생겨서 원복함 - 그 스크립트를
# 확인 안 하고 전역 설정만 보고 판단한 조사 실수였음.

# 스테이트 저장 시 스크린샷도 같이 찍어서 저장(state 파일 옆에 .png) — 기본값이
# x86_64에서만 true이고 그 외 아키텍처(우리 aarch64 포함)는 false라 명시적으로 켬.
# 추후 ES 게임 목록 화면에서 스테이트 미리보기로 활용 예정(2026-07-06)
savestate_thumbnail_enable = "true"

# Video: Vulkan via VK_KHR_display (KMS) — Mali-G310 DDK 지원, gl은 폴백
video_driver = "vulkan"
video_fullscreen = true
video_windowed_fullscreen = true
video_vsync = true
video_smooth = false
video_scale_integer = false
video_aspect_ratio_auto = true

# Audio: PulseAudio 직결 (2026-07-17 PA 전환) - alsathread+alsa-plugins pulse
# 경유는 RA 오디오 타이밍과 플러그인 버퍼 협상이 어긋나 찌그러진 소리가 남
# (실기기 확인). audio_device는 pulse 드라이버에선 서버 주소라 비움(기본 소켓).
audio_driver = "pulse"
audio_device = ""
audio_latency = 64
audio_enable = true

# MIDI: S62midisynth가 띄우는 fluidsynth 상시 데몬(ALSA 시퀀서 포트
# "RetroPangUI FluidSynth")을 기본 출력으로 - 외장 MT-32 등 실기기가
# 있으면 share/system/retroarch/retroarch.cfg(사용자 설정, 항상 이 뒤에
# 붙어서 우선 적용됨)에서 덮어쓰면 됨. dosbox-pure의 MIDI Output을
# "frontend"로 두면 이 값을 그대로 씀.
midi_driver = "alsa"
midi_output = "RetroPangUI FluidSynth"

# Input
# udev: /dev/input/event* 직접 읽기, VT/logind 불필요 (root 권한으로 접근)
# KMS/DRM 환경에서 활성 VT가 없으면 linuxraw 키보드가 RAUI에서 동작 안 함
input_driver = "udev"
# joypad는 udev 사용: evdev(/dev/input/eventX)를 통해 EV_FF 이벤트 전송 → rumble 작동
# linuxraw(/dev/input/jsX)는 FF를 전송하지 않아 진동이 동작하지 않음
input_joypad_driver = "udev"
# 2026-07-20: share로 이동(ES↔RA 입력 매핑 연동 2단계) - 여기가 쓰기 가능해야
# ES 마법사로 잡은 사용자 매핑을 RA autoconfig로 변환해서 넣을 수 있음(원래
# /etc/retroarch/autoconfig는 squashfs라 읽기 전용). 번들 기본값은 S95retropangui가
# 첫 부팅에 이 디렉토리로 파일 단위 동기화.
joypad_autoconfig_dir = "/retropangui/share/system/retroarch/autoconfig"


# Core options
core_options_path = "/retropangui/share/system/retroarch/retroarch-core-options.cfg"

# Menu
menu_driver = "ozone"
# 조이패드로 RA 메뉴 탐색 허용 (false면 게임 바인딩이 메뉴에 전달 안 됨)
menu_unified_controls = "true"
# 모든 포트의 패드가 RA 메뉴를 조작할 수 있도록 허용
all_users_control_menu = "true"

# Assets (Ozone 폰트·텍스처 등)
assets_directory = "/usr/share/retroarch"

config_save_on_exit = "false"

# Hotkeys — HK = Xbox 버튼(BTN_MODE, 버튼 8). enable_hotkey 없으면 핫키가 항상 활성화되어
# 게임 중 일반 버튼 입력이 핫키로 오인됨. 반드시 enable_hotkey_btn을 지정해야 함.
#
# 이 값들은 전부 Xbox 360 Wireless Receiver.cfg 기준 논리 인덱스(b=0,a=1,x=2,y=3)로
# 고정된 폴백값 — 실제로는 rpui-launcher가 게임 실행마다 연결된 패드의 autoconfig에서
# a/b/x/y·menu_toggle·start 값을 읽어 전부 동적으로 오버라이드함(commit 08410fa 이후
# 계속 확장, 최신은 8517029/2026-07-05). 패드가 없거나 autoconfig 매칭 실패 시에만
# 이 폴백값이 실제로 쓰임.
#
# 물리 위치 기준 규칙(2026-07-05 확정): 메뉴=South(b) 초기화=East(a)
# 저장=West(y) 로드=North(x) — 이전엔 save/load 값이 서로 뒤바뀌어 있었음(주석은
# "HK+Y→세이브"였지만 실제 인덱스 2는 Xbox 360의 x_btn이라 실제로는 로드와 뒤바뀐 상태).
input_enable_hotkey_btn        = "8"       # Xbox 버튼 누른 채로만 핫키 활성화
input_exit_emulator_btn        = "7"       # HK + Start → 게임 종료
input_reset_btn                = "1"       # HK + A(동쪽)  → 리셋
input_menu_toggle_btn          = "0"       # HK + B(남쪽)  → RA 메뉴
input_save_state_btn           = "3"       # HK + Y(서쪽)  → 세이브
input_load_state_btn           = "2"       # HK + X(북쪽)  → 로드
input_state_slot_increase_btn  = "h0up"    # HK + ↑     → 슬롯 +
input_state_slot_decrease_btn  = "h0down"  # HK + ↓     → 슬롯 -
input_rewind_btn               = "h0left"  # HK + ←     → 되감기
input_hold_fast_forward_btn    = "h0right" # HK + →     → 빨리감기
input_screenshot_btn           = "4"       # HK + L1    → 스크린샷
input_recording_toggle_btn     = "5"       # HK + RB    → 녹화

# 좌측 아날로그 스틱을 십자키(D-pad)로도 동작시킴 — NES/SNES/메가드라이브/32X/
# 세가CD/MSX1/MSX2 등 원래 아날로그 스틱이 없는 8/10버튼 패드 기반 시스템 전용
# 기본값(2026-07-05). PSX/PC류(DOS/ScummVM/PC-88/PC-98)는 자체 아날로그 스틱
# 조작이 있거나 방향키 그대로가 자연스러워서 각 시스템 .retroarch.cfg에서
# "0"(꺼짐)으로 되돌림 — post-build.sh(generate_es_systems.py)의 시스템별
# 스크린샷 .retroarch.cfg 초기화 로직 참고.
# 0=끔 1=좌 아날로그 2=우 아날로그 3=좌 아날로그 강제 4=우 아날로그 강제
input_player1_analog_dpad_mode = "1"

# Logging
# frontend_log_level/libretro_log_level 기본값은 1(INFO) - 0(DEBUG)으로
# 낮춰서 코어 진단(예: HW 렌더 협상 실패 원인) 추적 시 더 자세히 남게 함
# (2026-07-14, RETRO_LOG_DEBUG=0/INFO=1/WARN=2/ERROR=3).
log_verbosity = "true"
frontend_log_level = "0"
libretro_log_level = "0"
log_to_file = "true"
log_to_file_timestamp = "false"
log_dir = "/var/log"

# 이 파일은 기본값 템플릿입니다.
# 실제 사용 파일: /retropangui/share/system/retroarch/retroarch.cfg (S95retropangui가 첫 부팅 시 복사)
