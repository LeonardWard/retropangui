# RetroPangUI — 2026-07-05: disable_ertm=1 오버라이드를 제거하려고 이 파일을
# 삭제했었는데, Buildroot의 output/target/이 증분이라 "파일 삭제"가 반영
# 안 되고 이전 빌드의 squashfs 산출물이 그대로 남아있었음(실기기
# /sys/module/bluetooth/parameters/disable_ertm이 여전히 Y로 확인됨).
# 그래서 파일을 없애는 대신 명시적으로 커널 기본값(N=ERTM 유지)을 써서
# 내용 자체를 덮어쓰는 방식으로 확실히 반영되게 함 — 실제 운영 중인
# Recalbox 기기 확인 결과 disable_ertm=N이 맞는 설정.
options bluetooth disable_ertm=N
