input_driver = "udev"
input_device = "HID 0925:8866"
input_vendor_id = "2341"
input_product_id = "34918"

# 물리 버튼 — 2026-07-05 실기기 raw evdev 이벤트 실측(Cross/Circle/Square/Triangle/
# L1/R1/L2/R2/Select/Start/L3/R3 순서로 직접 눌러서 확인). PS2 USB Adapter.cfg
# (DragonRise, VID 0810:0001)와 버튼 코드 범위(288~299)는 같지만 배열이 다름 —
# 같은 "제네릭 조이스틱" 클래스 칩이라도 실기기 실측 없이는 못 맞춤.
#
# 중요: RA udev 드라이버(input/drivers_joypad/udev_joypad.c)는 raw evdev
# keycode를 "발견된 순서대로 0부터 매긴 논리 인덱스"로 다시 매핑해서
# (button_bind[raw_code] = 논리순번) 그 논리 인덱스로 버튼 상태를 저장한다.
# autoconfig의 _btn 필드는 이 "논리 인덱스"를 받아야 하며 raw evdev code가
# 아니다 — 처음엔 raw code(288~299)를 그대로 넣는 실수를 해서 실제 게임에서
# 입력이 어긋났음(2026-07-05 발견, 논리 인덱스 = raw code - 288로 정정).
#
# DS2 규약: South=Cross, East=Circle, West=Square, North=Triangle
#
# 2026-07-05 재확인: L1/R1/L2/R2/Select/Start 순서를 옛 Twin USB Joystick.cfg
# (VID 0810:0001, 다른 하드웨어)와 동일하다고 가정하고 그 값을 가져다 썼다가
# 실제 게임에서 매핑이 틀어짐 — 버튼별로 하나씩 다시 raw evdev 캡처해서
# 재검증한 결과 최초 실측값이 맞았고 옛 파일 값은 틀렸음. face 버튼(0~3)이
# 우연히 같았을 뿐, VID:PID가 다른 별개 하드웨어라 나머지 버튼 순서까지
# 같다고 가정하면 안 됨 — 반드시 이 기기 자체로 실측해야 함.
input_b_btn = "2"
input_a_btn = "1"
input_y_btn = "3"
input_x_btn = "0"

input_l_btn = "4"
input_r_btn = "5"
input_l2_btn = "6"
input_r2_btn = "7"
input_select_btn = "9"
input_start_btn = "8"
input_l3_btn = "10"
input_r3_btn = "11"

# 십자키 — 2026-07-05 실기기 실측 완료(위/아래/왼쪽/오른쪽 순서로 직접 눌러서 확인).
# 처음에 _axis 필드("-17"/"+17")로 잘못 씀 — RA의 input_config_parse_joy_axis()는
# +N/-N을 그냥 "논리 축 번호 N"으로만 해석하고 hat을 전혀 처리 못 해서 무반응이었음
# (이 기기는 논리 축이 0~3뿐이라 축 17 자체가 존재하지 않음). hat은 반드시
# _btn 필드에 "h<hat번호><방향>" 문자열로 써야 함(input_config_parse_joy_button()의
# 'h'로 시작하면 hat으로 파싱하는 분기) — 옛 Twin USB Joystick.cfg 방식이 맞았음.
input_up_btn = "h0up"
input_down_btn = "h0down"
input_left_btn = "h0left"
input_right_btn = "h0right"

# 스틱 — 실기기 raw ABS 이벤트 실측(왼쪽/오른쪽 스틱 각각 상하좌우로 돌려서 확인).
# 축도 버튼과 마찬가지로 논리 인덱스를 받음(axes_bind[raw_code] = 논리순번).
# 이 기기 ABS 비트: raw 0(X)=논리0  raw 1(Y)=논리1  raw 2(Z)=논리2  raw 6(THROTTLE)=논리3
# 왼쪽 스틱/오른쪽 스틱 X는 raw code와 논리 인덱스가 우연히 같아서 문제없었지만
# 오른쪽 스틱 Y(raw 6)만 논리 인덱스 3으로 달라짐 — 2026-07-05 정정.
input_l_x_plus_axis = "+0"
input_l_x_minus_axis = "-0"
input_l_y_plus_axis = "+1"
input_l_y_minus_axis = "-1"
input_r_x_plus_axis = "+2"
input_r_x_minus_axis = "-2"
input_r_y_plus_axis = "+3"
input_r_y_minus_axis = "-3"

# 가이드/홈 버튼이 없는 12버튼 구성이라 SELECT를 메뉴 토글 겸용으로 사용 —
# rpui-launcher가 게임 실행마다 이 값을 읽어 전역 hotkey_btn으로 동적 오버라이드(commit 08410fa)
input_menu_toggle_btn = "9"
