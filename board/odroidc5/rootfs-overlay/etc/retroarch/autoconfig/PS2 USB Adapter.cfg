# RetroArch autoconfig — PS2 USB 어댑터 (VID:0810 PID:0001, DragonRise)
# 데몬 없이 직접 연결 시 사용. 데몬 동작 중에는 RetroPangUI P*.cfg가 우선.
#
# 장치 이름 확인: cat /proc/bus/input/devices | grep -A1 "0810"
# 흔한 이름: "USB GamePad", "DragonRise Inc. Generic USB Joystick"
# 이 파일 이름을 실제 장치 이름에 맞게 변경 필요.
input_device = "USB GamePad"
input_driver = "udev"

# 버튼 (0-indexed evdev BTN_MISC 계열, DragonRise 배열)
# □(Square)=b0  ×(Cross)=b1  ○(Circle)=b2  △(Triangle)=b3
# L1=b4  R1=b5  L2=b6  R2=b7  Select=b8  Start=b9  L3=b10  R3=b11
input_b_btn      = "289"
input_a_btn      = "290"
input_y_btn      = "288"
input_x_btn      = "291"
input_l_btn      = "292"
input_r_btn      = "293"
input_l2_btn     = "294"
input_r2_btn     = "295"
input_select_btn = "296"
input_start_btn  = "297"
input_l3_btn     = "298"
input_r3_btn     = "299"

# 스틱 (ABS_X=0, ABS_Y=1, ABS_RX=2, ABS_RY=3)
input_l_x_plus_axis  = "+0"
input_l_x_minus_axis = "-0"
input_l_y_plus_axis  = "+1"
input_l_y_minus_axis = "-1"
input_r_x_plus_axis  = "+2"
input_r_x_minus_axis = "-2"
input_r_y_plus_axis  = "+3"
input_r_y_minus_axis = "-3"

# 십자키 (HAT)
input_up_axis    = "-17"
input_down_axis  = "+17"
input_left_axis  = "-16"
input_right_axis = "+16"

# 진동 없음 (어댑터 하드웨어 미지원)
