input_driver = "udev"
input_device = "Microsoft X-Box 360 pad"

# 2026-07-06: GameSir G3v(동글/케이블 둘 다)와 8BitDo SN30/SF30 Pro(케이블)가
# xpad 드라이버를 통해 전부 이 똑같은 이름("Microsoft X-Box 360 pad", 045e:028e)
# 으로 잡힘 - RetroArch autoconfig는 이름으로만 매칭해서 서로 다른 물리 패드가
# 이 파일 하나를 공유함. 8BitDo SN30 Pro로 실제 게임에서 검증한 결과 X/Y가
# 뒤바뀐 배치였음(기존 블루투스 전용 8Bitdo SN30 Pro.cfg와 동일 순서로 수정) -
# GameSir G3v는 X/Y가 처음 가정한 순서(안 뒤바뀐 쪽)일 수도 있어서 이 수정으로
# GameSir 쪽이 틀어질 가능성 있음 - 재검증 필요(todo-20260706-gamesir-g3v.html
# 참고).
input_b_btn = "0"
input_a_btn = "1"
input_y_btn = "2"
input_x_btn = "3"
input_l_btn = "4"
input_r_btn = "5"
input_select_btn = "6"
input_start_btn = "7"
input_l3_btn = "8"
input_r3_btn = "9"
# 2026-07-09: es_input.cfg(ES 자체 메뉴)는 commit cdb478f로 hotkey를 select로
# 통일했으나, 이 파일(게임 실행 중 RetroArch 핫키 - rpui-launcher.py가
# input_menu_toggle_btn 값을 읽어 input_enable_hotkey_btn으로 주입)은 그때
# 빠뜨려서 계속 옛 HOME/Guide 버튼(10)으로 남아있었음 - 같은 이유로 select(6)로 통일.
input_menu_toggle_btn = "6"

# D-패드 (HAT0)
input_up_btn = "h0up"
input_down_btn = "h0down"
input_left_btn = "h0left"
input_right_btn = "h0right"

# 아날로그 트리거 (축)
input_l2_axis = "+2"
input_r2_axis = "+5"

# 좌 스틱
input_l_x_plus_axis = "+0"
input_l_x_minus_axis = "-0"
input_l_y_plus_axis = "+1"
input_l_y_minus_axis = "-1"

# 우 스틱
input_r_x_plus_axis = "+3"
input_r_x_minus_axis = "-3"
input_r_y_plus_axis = "+4"
input_r_y_minus_axis = "-4"
