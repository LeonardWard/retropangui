# RetroArch autoconfig — RetroPangUI P4
# linuxraw 드라이버: joydev가 BTN_*→버튼0~, ABS_*→축0~ 순서로 매핑
input_device = "RetroPangUI P4"
input_driver = "linuxraw"

# 얼굴 버튼 (BTN_SOUTH=0, BTN_EAST=1, BTN_NORTH=2, BTN_WEST=3)
input_b_btn = "0"
input_a_btn = "1"
input_y_btn = "2"
input_x_btn = "3"

# 어깨 버튼 (BTN_TL=4, BTN_TR=5, BTN_TL2=6, BTN_TR2=7)
input_l_btn  = "4"
input_r_btn  = "5"
input_l2_btn = "6"
input_r2_btn = "7"

# 아날로그 트리거 (축 인덱스: ABS_Z=2, ABS_RZ=5)
input_l2_axis = "+2"
input_r2_axis = "+5"

# 메뉴/시스템 버튼 (BTN_SELECT=8, BTN_START=9, BTN_MODE=10)
input_select_btn      = "8"
input_start_btn       = "9"
input_menu_toggle_btn = "10"

# 스틱 클릭 (BTN_THUMBL=11, BTN_THUMBR=12)
input_l3_btn = "11"
input_r3_btn = "12"

# 왼쪽 스틱 (ABS_X=axis0, ABS_Y=axis1)
input_l_x_plus_axis  = "+0"
input_l_x_minus_axis = "-0"
input_l_y_plus_axis  = "+1"
input_l_y_minus_axis = "-1"

# 오른쪽 스틱 (ABS_RX=axis3, ABS_RY=axis4)
input_r_x_plus_axis  = "+3"
input_r_x_minus_axis = "-3"
input_r_y_plus_axis  = "+4"
input_r_y_minus_axis = "-4"

# 십자키 (ABS_HAT0X=axis6, ABS_HAT0Y=axis7 — joydev가 HAT을 axis로 변환)
input_up_axis    = "-7"
input_down_axis  = "+7"
input_left_axis  = "-6"
input_right_axis = "+6"
