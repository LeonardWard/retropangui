# 2026-07-05: 핫키 필드를 레거시 방식(이 파일에 직접 하드코딩)에서 최신 방식으로
# 전환 — rpui-launcher가 게임 실행마다 이 패드의 a/b/x/y_btn·start_btn·
# menu_toggle_btn 값을 읽어 전역 핫키 설정(enable_hotkey/exit_emulator/
# menu_toggle/reset/save_state/load_state)을 전부 동적으로 계산해서 오버라이드함
# (PS2 Twin USB Adapter (0925-8866).cfg와 동일 패턴). 예전엔 이 파일에
# input_enable_hotkey_btn=8/input_exit_emulator_btn=9 등을 직접 박아뒀는데,
# rpui-launcher가 menu_toggle_btn 필드를 "핫키 활성화 버튼"으로 재해석하는
# 최신 관례와 충돌해서 "핫키+START로 종료 안 됨" 버그가 남 — 레거시 필드를
# 전부 제거하고 menu_toggle_btn만 select(8)로 맞춰서 최신 관례로 통일.
input_menu_toggle_btn = "8"
