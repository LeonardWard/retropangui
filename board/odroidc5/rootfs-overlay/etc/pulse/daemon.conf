# RetroPangUI PulseAudio 데몬 설정 (2026-07-17)
#
# 샘플레이트 48kHz 고정 - Amlogic TDM-B→HDMI 경로는 48k 외 rate로
# hw params 재협상이 들어가면 드라이버가 거부한다. PA 기본값(44.1k 기본 +
# 48k 대체)으로 두면 44.1kHz 스트림(mp3/스플래시 영상 오디오)이 sink
# resume 시 rate 전환을 유발 → "Resume failed, couldn't restore original
# sample settings" 무한 루프 → 클라이언트(mpv 스플래시)가 오디오 쓰기에서
# 블록되어 부팅이 ES까지 못 가는 행이 실기기에서 재현됨(2026-07-17,
# todo-20260716-pulseaudio-migration.html 테스트 기록). default와 alternate를
# 같은 값으로 두면 rate 전환 자체가 봉인된다. 예전 asound.conf의 dmix도
# 같은 이유로 48000/S16_LE 고정이었음.
# 명시 안 한 키는 PA 내장 기본값을 따름.

default-sample-format = s16le
default-sample-rate = 48000
alternate-sample-rate = 48000
