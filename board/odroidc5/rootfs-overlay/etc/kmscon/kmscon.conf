# 2026-07-09: 유틸리티 터미널이 쓰는 kmscon 설정.
#
# terminal.py는 이제 커맨드라인 인자 없이 그냥 "kmscon"만 실행함 - 여기
# 있는 설정이 그대로 다 적용됨(커맨드라인 인자를 따로 주면 이 값을
# 덮어씀). CLI와 이 파일은 완전히 같은 옵션 테이블을 씀(kmscon 소스
# src/kmscon_conf.c의 CONF_OPTION 매크로로 등록된 옵션들, CLI 파싱과
# 파일 파싱이 동일 옵션에 대해 각각 콜백을 가짐).
vt=1
term=linux
font-size=17
oneshot

# login=으로 커스텀 프로그램(예: 우리가 만든 세션 스크립트)을 직접
# 지정하면 터미널 행/열이 24x80으로 고정되는 kmscon 버그가 있어서
# (font-size를 뭘로 바꿔도 항상 24x80, 실기기 stty size로 확인)
# 진짜 /bin/login을 그대로 씀. "-f root"는 busybox login의 "이미
# 인증됨, 비밀번호 생략" 옵션 - 이 경로를 타면 정상적으로 큰 크기
# (54x128 실측)가 나오면서도 비밀번호 프롬프트는 없음. 실제 배너 출력과
# 한글 입력기(uim-fep) 실행은 root의 .profile(rootfs-overlay/root/.profile)
# 이 로그인 셸 시작 시 자동으로 담당함.
login=/bin/login -f root
