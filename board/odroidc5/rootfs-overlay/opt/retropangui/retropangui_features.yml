# retropangui_features.yml
# ES 시작 시 이 파일을 읽어 메뉴 항목을 자동 생성한다.
# 값은 retropangui.conf 에 저장된다.
# restart: none | es | system
# parent: 항목이 삽입될 위치
#   - game | controller | system : 해당 ES 카테고리 메뉴 안에 항목으로 직접 삽입
#   - main                       : 메인 메뉴에 독립 서브메뉴로 추가 (확장용)

menus:
  - id: system_settings
    label: "SYSTEM SETTINGS"
    parent: system   # ES SYSTEM SETTINGS 메뉴에 항목으로 삽입됨
    items:
      - id: rp.locale
        label: "LOCALE"
        type: list
        conf_key: system.language
        restart: system
        options:
          - value: ko_KR
            label: "한국어 (Korean)"
          - value: en_US
            label: "English (US)"
          - value: ja_JP
            label: "日本語 (Japanese)"
          - value: zh_CN
            label: "中文简体 (Chinese)"

      - id: rp.timezone
        label: "TIMEZONE"
        type: list
        conf_key: system.timezone
        restart: system
        options:
          - value: Asia/Seoul
            label: "Seoul (KST)"
          - value: America/New_York
            label: "New York (EST)"
          - value: Europe/Paris
            label: "Paris (CET)"
          - value: America/Los_Angeles
            label: "Los Angeles (PST)"

  - id: network_settings
    label: "NETWORK SETTINGS"
    parent: system
    items:
      - id: rp.ssh
        label: "SSH"
        type: toggle
        conf_key: system.ssh
        restart: system

  - id: video_settings
    label: "VIDEO SETTINGS"
    parent: game     # ES GAME SETTINGS 메뉴에 항목으로 삽입됨
    items:
      - id: rp.video_smooth
        label: "SMOOTH SCALING"
        type: toggle
        conf_key: global.video_smooth
        restart: none

      - id: rp.video_scale_integer
        label: "INTEGER SCALING"
        type: toggle
        conf_key: global.video_scale_integer
        restart: none

  - id: game_settings
    label: "GAME SETTINGS"
    parent: game
    items:
      - id: rp.rewind
        label: "REWIND"
        type: toggle
        conf_key: global.rewind_enable
        restart: none

      - id: rp.savestate_auto_save
        label: "AUTO SAVE STATE"
        type: toggle
        conf_key: global.savestate_auto_save
        restart: none

      - id: rp.savestate_auto_load
        label: "AUTO LOAD STATE"
        type: toggle
        conf_key: global.savestate_auto_load
        restart: none

  - id: advanced_settings
    label: "ADVANCED SETTINGS"
    parent: controller   # ES CONTROLLER SETTINGS 메뉴에 항목으로 삽입됨
    items:
      - id: rp.input_joypad_driver
        label: "JOYPAD DRIVER"
        type: list
        conf_key: global.input_joypad_driver
        restart: system
        options:
          - value: linuxraw
            label: "linuxraw (기본)"
          - value: udev
            label: "udev"

      - id: rp.menu_unified_controls
        label: "UNIFIED CONTROLS"
        type: toggle
        conf_key: global.menu_unified_controls
        restart: none
