# genimage configuration for Odroid C5
# SD 카드 파티션 레이아웃 (OTA 구조)
# p1 boot (FAT32, 3GB): kernel, DTB, initramfs, squashfs
# p2 overlay (ext4, 3GB): overlayfs upper/work — AI CLI(Claude/Gemini/Codex) 설치 용도
# p3 share (exFAT, 나머지): 첫 부팅 시 initramfs가 생성

image boot.vfat {
    vfat {
        files = {
            "boot.scr",
            "Image",
            "s7d_s905x5m_odroidc5.dtb",
            "initramfs.cpio.gz",
            "retropangui.squashfs",
            "config.ini",
            "retropangui-boot.conf.init",
            "boot-logo.bmp"
        }
    }
    size = 3072M
}

image sdcard.img {
    hdimage {
        gpt = false
    }

    partition uboot {
        in-partition-table = "no"
        image = "u-boot.bin.sd.bin"
        offset = 512
    }

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
        offset = 8M
    }

    partition overlay {
        partition-type = 0x83
        image = "overlay.ext4"
    }
}
